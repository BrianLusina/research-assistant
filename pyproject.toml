[project]
name = "research-assistant"
version = "0.1.0"
description = "AI powered research assistant"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "crewai>=1.14.4",
    "dotenv>=0.9.9",
    "langchain>=1.2.17",
    "langchain-openai>=1.2.1",
    "openai>=2.32.0",
    "reportlab>=4.5.0",
    "requests>=2.32.5",
    "streamlit>=1.52.1",
]

[dependency-groups]
lint = [
    "pyrefly>=0.62.0",
    "ruff>=0.15.12",
]
