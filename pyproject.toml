[project]
name = "research-assistant"
version = "0.1.0"
description = "AI powered research assistant"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "crewai>=1.14.4",
    "dotenv>=0.9.9",
    "langchain>=1.2.18",
    "langchain-openai>=1.2.1",
    "openai>=2.36.0",
    "reportlab>=4.5.1",
    "requests>=2.32.5",
    "streamlit>=1.57.0",
]

[dependency-groups]
lint = [
    "pyrefly>=0.64.1",
    "ruff>=0.15.13",
]
